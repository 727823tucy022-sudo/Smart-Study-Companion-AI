{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center animate-fade-in-up">
    <div class="col-lg-8 col-xl-6">
        <div class="glass-card p-5">
            <h2 class="fw-bold text-center mb-2">Connect with Support</h2>
            <p class="text-muted text-center mb-4">Have questions regarding machine learning predictions or structural metrics? Drop us a line.</p>
            
            <form action="{{ url_for('contact') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Full Legal Name</label>
                    <input type="text" class="form-control bg-dark bg-opacity-20 text-reset border-secondary" placeholder="Jane Doe" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email Address</label>
                    <input type="email" class="form-control bg-dark bg-opacity-20 text-reset border-secondary" placeholder="jane@university.edu" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Inquiry Message Context Body</label>
                    <textarea class="form-control bg-dark bg-opacity-20 text-reset border-secondary" rows="4" placeholder="Type your query parameters here..." required></textarea>
                </div>
                <button type="submit" class="btn btn-gradient w-100 py-2 fw-bold">Dispatch Message Blueprint</button>
            </form>

            <div class="mt-4 pt-3 border-top border-secondary border-opacity-10 text-center">
                <div class="d-flex justify-content-center gap-4 fs-4 text-muted">
                    <a href="#" class="text-reset opacity-75 hover-opacity-100"><i class="bi bi-github"></i></a>
                    <a href="#" class="text-reset opacity-75 hover-opacity-100"><i class="bi bi-linkedin"></i></a>
                    <a href="#" class="text-reset opacity-75 hover-opacity-100"><i class="bi bi-twitter-x"></i></a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
