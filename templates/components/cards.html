<div class="row g-4 mb-4">
    <div class="col-md-4">
        <div class="glass-card metric-card animate-fade-in-up delay-1">
            <div class="text-muted fw-semibold uppercase text-xs mb-1">Total System Inferences</div>
            <div class="metric-value font-bold" id="metric-total">{{ summary_metrics_total if summary_metrics_total else '500+' }}</div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="glass-card metric-card animate-fade-in-up delay-2">
            <div class="text-muted fw-semibold uppercase text-xs mb-1">Mean Prediction Confidence</div>
            <div class="metric-value font-bold text-success">{{ summary_metrics_conf if summary_metrics_conf else '88.4' }}%</div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="glass-card metric-card animate-fade-in-up delay-3">
            <div class="text-muted fw-semibold uppercase text-xs mb-1">Deployed Production Model</div>
            <div class="metric-value font-bold text-info" style="font-size: 1.6rem; padding-top: 10px;">{{ summary_model_name if summary_model_name else 'Random Forest' }}</div>
        </div>
    </div>
</div>
